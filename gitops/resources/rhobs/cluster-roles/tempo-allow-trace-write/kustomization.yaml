resources:
  - ../../../../../components/rbac/cluster-role/generic
patches:
  - target:
      kind: ClusterRole
      name: replace-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: tempo-allow-trace-write
      - op: replace
        path: /rules
        value:
          - apiGroups:
              - 'tempo.grafana.com'
            resources: 
              - cluster
            resourceNames:
              - traces
            verbs:
              - 'create' 
