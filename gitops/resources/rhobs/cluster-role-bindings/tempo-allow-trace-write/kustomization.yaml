resources:
  - ../../../../../components/rbac/cluster-role-binding/generic
patches:
  - target:
      kind: ClusterRoleBinding
      name: replace-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: tempo-allow-trace-write
      - op: replace
        path: /subjects
        value:
          - kind: ServiceAccount
            name: rhobs-sa
            namespace: openshift-observability
      - op: replace
        path: /roleRef/name
        value: tempo-allow-trace-write
