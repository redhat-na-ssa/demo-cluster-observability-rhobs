<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Load Tester</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            color: #2c3e50;
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        h2 {
            color: #7f8c8d;
            font-size: 1.5rem;
            word-break: break-all;
            margin-bottom: 0.5rem;
        }
        h3 {
            color: #95a5a6;
            font-weight: normal;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{.Method}}</h1>
        <h2>{{.Detail}}</h2>
        <h3>{{.ElapsedSecs}}s</h3>
    </div>
</body>
</html>
