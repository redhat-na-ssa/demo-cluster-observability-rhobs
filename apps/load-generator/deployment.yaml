---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: load-tester
    component: load-tester
  name: load-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-tester
      component: load-tester
  strategy: {}
  template:
    metadata:
      labels:
        app: load-tester
        component: load-tester
    spec:
      initContainers:
        - image: quay.io/fedora/fedora:43
          name: wait-for-web-server
          env:
            - name: HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: load-generator
                  key: HOSTNAME
          command:
            - sh
            - -c
            - |-
              >&2 echo "Waiting 180s for web server to become available at http://$HOSTNAME:8080";
              timeout 180s sh -c 'while true; do curl -sS http://$HOSTNAME:8080 && exit 0; sleep 1; done'
      containers:
        - image: quay.io/fedora/fedora:43
          name: container
          env:
            - name: HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: load-generator
                  key: HOSTNAME
          command:
            - bash
            - -c
            - |-
              >&2 echo "load-tester has started. Press CTRL-C to stop."
              attempts=0
              iterations=0
              while true
              do
                >&2 echo "---> iteration $((attempts+1))"
                nonce=$((RANDOM % 100))
                test "$(( nonce % 3 ))" -eq 0 && curl -o /dev/null -sS -v "http://$HOSTNAME:8080" && continue
                >&2 echo "DEBUG: Payload: $payload"
                curl -v -sS "http://$HOSTNAME:8080" --json "$payload"
                sleep $((RANDOM % 3))
                attempts=$((attempts+1))
              done
